<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>数学まとめプリント</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <!-- KaTeX CSS for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <!-- markdown-it for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13/dist/markdown-it.min.js"></script>
    <!-- KaTeX for math rendering -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        body {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.7;
            color: #333;
        }
        h1, h2, h3, h4, h5, h6 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
        pre {
            background: #f6f8fa;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
        }
        code {
            background: #f6f8fa;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        pre code {
            background: none;
            padding: 0;
        }
        blockquote {
            margin: 1rem 0;
            padding-left: 1rem;
            border-left: 4px solid #ddd;
            color: #666;
        }
        ul, ol { margin: 1rem 0; }
        li { margin: 0.5rem 0; }
    </style>
</head>
<body>
<div id="content">読み込み中…</div>

<script>
window.addEventListener('load', function() {
    // Initialize markdown-it
    const md = window.markdownit({html: true, linkify: true, breaks: true});
    
    fetch('readme.md')
        .then(response => {
            if (!response.ok) throw new Error('Failed to fetch readme.md');
            return response.text();
        })
        .then(markdown => {
            const html = md.render(markdown);
            document.getElementById('content').innerHTML = html;
            // Render math with KaTeX auto-render
            if (window.renderMathInElement) {
                renderMathInElement(document.getElementById('content'), {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ]
                });
            }
        })
        .catch(error => {
            document.getElementById('content').innerHTML = '<p style="color:red;">エラー: ' + error.message + '</p>';
        });
});
</script>
</body>
</html>
